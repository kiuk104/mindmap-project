<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 (홈 화면 추가 시 OS가 모양을 자체 마스킹할 수 있어 정사각 채움) -->
  <rect width="512" height="512" fill="#1f6feb"/>

  <!-- 둥근 보더 (배경이 마스킹되지 않을 때를 위한 시각 처리) -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#1f6feb"/>

  <!-- 연결선 -->
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="256" y1="256" x2="130" y2="140"/>
    <line x1="256" y1="256" x2="382" y2="140"/>
    <line x1="256" y1="256" x2="130" y2="372"/>
    <line x1="256" y1="256" x2="382" y2="372"/>
  </g>

  <!-- 중앙 노드 -->
  <circle cx="256" cy="256" r="68" fill="#f85149" stroke="#ffffff" stroke-width="14"/>

  <!-- 자식 노드 -->
  <circle cx="130" cy="140" r="42" fill="#3fb950" stroke="#ffffff" stroke-width="10"/>
  <circle cx="382" cy="140" r="42" fill="#e3b341" stroke="#ffffff" stroke-width="10"/>
  <circle cx="130" cy="372" r="42" fill="#8957e5" stroke="#ffffff" stroke-width="10"/>
  <circle cx="382" cy="372" r="42" fill="#39c5cf" stroke="#ffffff" stroke-width="10"/>
</svg>
