<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 연결선 (centroid 460,315 → 자식 노드 중심) -->
  <g stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 460 315 C 540 315 580 220 660 220" />
    <path d="M 460 315 C 540 315 580 280 660 280" />
    <path d="M 460 315 C 540 315 580 340 660 340" />
    <path d="M 460 315 C 540 315 580 400 660 400" />
  </g>

  <!-- 중앙 노드 -->
  <g filter="url(#shadow)">
    <rect x="260" y="280" width="400" height="70" rx="14" fill="#1f6feb"/>
    <text x="460" y="324" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="28" font-weight="700" fill="white" text-anchor="middle">🗺️  마인드맵</text>
  </g>

  <!-- 자식 노드 (4개, 우측) -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#c9d1d9">
    <g filter="url(#shadow)">
      <rect x="660" y="190" width="240" height="60" rx="12" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
      <text x="780" y="226" text-anchor="middle">☁️  구글 드라이브 연동</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="660" y="250" width="240" height="60" rx="12" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
      <text x="780" y="286" text-anchor="middle">💾  로컬 자동 저장</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="660" y="310" width="240" height="60" rx="12" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
      <text x="780" y="346" text-anchor="middle">📱  모바일 · PWA 지원</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="660" y="370" width="240" height="60" rx="12" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
      <text x="780" y="406" text-anchor="middle">🌓  다크 / 라이트 테마</text>
    </g>
  </g>

  <!-- 하단 설명 -->
  <text x="600" y="520" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="500" fill="#8b949e" text-anchor="middle">
    팀과 함께 쓰는 공동 편집 마인드맵
  </text>
  <text x="600" y="565" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="16" fill="#6e7681" text-anchor="middle">
    kiuk104.github.io/mindmap-project
  </text>
</svg>
