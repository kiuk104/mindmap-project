<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 라이트/다크 모두에서 보이는 짙은 둥근 배경 -->
  <rect width="64" height="64" rx="13" fill="#1f6feb"/>

  <!-- 연결선 (자식 4개로 뻗는 흰색 가지) -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="32" y1="32" x2="15" y2="16"/>
    <line x1="32" y1="32" x2="49" y2="16"/>
    <line x1="32" y1="32" x2="15" y2="48"/>
    <line x1="32" y1="32" x2="49" y2="48"/>
  </g>

  <!-- 중앙 노드 (빨강) -->
  <circle cx="32" cy="32" r="9" fill="#f85149" stroke="#ffffff" stroke-width="2"/>

  <!-- 자식 노드들 — 테마 기본 컬러 4종 -->
  <circle cx="15" cy="16" r="5" fill="#3fb950" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="49" cy="16" r="5" fill="#e3b341" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="15" cy="48" r="5" fill="#8957e5" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="49" cy="48" r="5" fill="#39c5cf" stroke="#ffffff" stroke-width="1.5"/>
</svg>
